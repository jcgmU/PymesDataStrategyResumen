services:
  # ==========================================================================
  # REDIS - Message Broker (BullMQ)
  # ==========================================================================
  redis:
    image: redis:7.4-alpine
    container_name: pymes-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # POSTGRESQL - Relational Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: pymes-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pymes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pymes_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-pymes_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pymes} -d ${POSTGRES_DB:-pymes_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================================================
  # MINIO - S3-Compatible Object Storage
  # ==========================================================================
  minio:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: pymes-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # MINIO INIT - Create Initial Buckets
  # ==========================================================================
  minio-init:
    image: minio/mc:latest
    container_name: pymes-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/datasets;
      mc mb --ignore-existing myminio/results;
      mc mb --ignore-existing myminio/temp;
      echo 'Buckets created successfully';
      exit 0;
      "

  # ==========================================================================
  # API GATEWAY - Node.js + Express + Prisma
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    container_name: pymes-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pymes}:${POSTGRES_PASSWORD:-pymes_dev_password}@postgres:5432/${POSTGRES_DB:-pymes_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_DATASETS: ${MINIO_BUCKET_DATASETS:-datasets}
      MINIO_BUCKET_RESULTS: ${MINIO_BUCKET_RESULTS:-results}
      MINIO_BUCKET_TEMP: ${MINIO_BUCKET_TEMP:-temp}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
    volumes:
      - ./api/src:/app/api/src:ro
      - ./prisma:/app/prisma:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # WORKER ETL - Python + FastAPI + Polars
  # ==========================================================================
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    container_name: pymes-worker
    ports:
      - "${WORKER_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pymes}:${POSTGRES_PASSWORD:-pymes_dev_password}@postgres:5432/${POSTGRES_DB:-pymes_dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_DATASETS: ${MINIO_BUCKET_DATASETS:-datasets}
      MINIO_BUCKET_RESULTS: ${MINIO_BUCKET_RESULTS:-results}
      MINIO_BUCKET_TEMP: ${MINIO_BUCKET_TEMP:-temp}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    volumes:
      - ./worker/src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # FRONTEND - Next.js App Router
  # ==========================================================================
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: pymes-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      INTERNAL_API_URL: http://api:3000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    volumes:
      - ../frontend/app:/app/app:ro
      - ../frontend/components:/app/components:ro
      - ../frontend/hooks:/app/hooks:ro
      - ../frontend/lib:/app/lib:ro
      - ../frontend/public:/app/public:ro
      - ../frontend/services:/app/services:ro
      - ../frontend/store:/app/store:ro
      - ../frontend/types:/app/types:ro
      - ../frontend/auth.ts:/app/auth.ts:ro
      - ../frontend/auth.config.ts:/app/auth.config.ts:ro
      - ../frontend/next.config.ts:/app/next.config.ts:ro
      - ../frontend/middleware.ts:/app/middleware.ts:ro
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  minio_data:
  frontend_node_modules:

networks:
  default:
    name: pymes-network
