name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-api:
    name: API Tests (Node.js/Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: api
        run: pnpm test

      - name: Run tests with coverage
        working-directory: api
        run: pnpm test:coverage

  test-worker:
    name: Worker Tests (Python/pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: worker
        run: python -m pytest -v

      - name: Run tests with coverage
        working-directory: worker
        run: python -m pytest --cov=src --cov-report=xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        working-directory: api
        run: pnpm install --frozen-lockfile

      - name: Install Worker dependencies
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint API
        working-directory: api
        run: pnpm lint

      - name: Type check API
        working-directory: api
        run: pnpm typecheck

      - name: Lint Worker
        working-directory: worker
        run: ruff check src

      - name: Type check Worker
        working-directory: worker
        run: mypy src
